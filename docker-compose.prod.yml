services:
  kiro-gateway:
    image: ghcr.io/sortbyiky/kiro-stack/kiro-gateway:latest
    container_name: kiro-gateway
    restart: unless-stopped
    environment:
      - PROXY_API_KEY=${INTERNAL_API_KEY}
      - VPN_PROXY_URL=${VPN_PROXY_URL:-}
      - DEBUG_MODE=${DEBUG_MODE:-off}
      - SKIP_STARTUP_CREDENTIAL_CHECK=true

  kiro-go:
    image: ghcr.io/sortbyiky/kiro-stack/kiro-go:latest
    container_name: kiro-go
    restart: unless-stopped
    depends_on:
      - kiro-gateway
    ports:
      - "8860:8080"
    volumes:
      - ./data:/app/data
    environment:
      - CONFIG_PATH=/app/data/config.json
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - KIRO_GATEWAY_BASE=http://kiro-gateway:8000
      - KIRO_GATEWAY_API_KEY=${INTERNAL_API_KEY}
